name: ESPResSo tests

on:
  pull_request:
  push:
    branches: [ "main" ] # Fixed the empty branches block

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup EESSI
        uses: eessi/github-action-eessi@v3
        with:
          eessi_stack_version: "2023.06"
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: |
          # 1. Load the ESPResSo module
          test "${RUNNER_ARCH}" = "X64" && module use /cvmfs/dev.eessi.io/espresso/versions/2023.06/software/linux/x86_64/amd/zen2/modules/all
          module load ESPResSo/dc87ede3f6c218bb71624460752bc8c26a271c33-foss-2023b
          module save espresso
          
          # 2. Create the venv with 3.11 AND clear out any old cached 3.12 environments!
          uv venv --python 3.11 --system-site-packages --clear
          
          # 3. Constrain numpy for ESPResSo compatibility
          uv pip install "numpy<2.0"
          
          # 4. Pre-install the legacy build backend AND wheel
          uv pip install "setuptools<70.0.0" wheel
          
          # 5. Install without build isolation
          uv pip install --no-build-isolation -e ".[dev]"
          
          module purge

      - name: Run test suite
        run: |
          module restore espresso
          export NUM_PROC=$(nproc)
          export OMP_PROC_BIND=false 
          export OMP_NUM_THREADS=1
          
          # 1. Forcefully activate the environment
          source .venv/bin/activate
          
          # 2. CMake Symlink Armor (Updated to target python3.11!)
          export PYTHONPATH="$PWD/.venv/lib/python3.11/site-packages:$PYTHONPATH"
          export Python_EXECUTABLE=$(which python)
          
          # 3. Run the tests directly
          COVERAGE=1 sh CI/run_espresso_test_suite.sh -j ${NUM_PROC}
          
          # 4. Run coverage tools
          python -m coverage combine . CI/espresso_tests
          python -m coverage report
          python -m coverage xml

      - name: Upload coverage to Codecov
        if: ${{ github.repository == 'SwarmRL/SwarmRL' }}
        uses: codecov/codecov-action@v5
        with:
          files: "./coverage.xml"
          disable_search: true
          env_vars: OS,PYTHON
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true